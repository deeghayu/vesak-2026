<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>සිරි වෙසක් මංගල්‍යය - 2026</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Abhaya+Libre:wght@400;700&family=Noto+Sans+Sinhala:wght@300;500;700&display=swap');

        :root {
            --gold: #ffd700;
            --dark-bg: #0a0a0a;
            --glass: rgba(255, 255, 255, 0.08);
        }

        body, html {
            margin: 0; padding: 0;
            background: var(--dark-bg);
            color: #fff;
            font-family: 'Noto Sans Sinhala', sans-serif;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        /* Background Video */
        .video-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -2; overflow: hidden;
        }
        .video-bg iframe {
            position: absolute; top: 50%; left: 50%;
            width: 100vw; height: 56.25vw; min-height: 100vh; min-width: 177.77vh;
            transform: translate(-50%, -50%); opacity: 0.2; pointer-events: none;
        }

        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 10%, rgba(0,0,0,0.9) 100%);
            z-index: -1;
        }

        .container { max-width: 1100px; margin: 0 auto; padding: 60px 20px; text-align: center; }

        h1 {
            font-family: 'Abhaya Libre', serif;
            font-size: clamp(2.5rem, 8vw, 4.5rem);
            color: var(--gold);
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.4);
            margin-bottom: 10px;
        }

        .video-main {
            width: 100%; aspect-ratio: 16/9; margin: 40px 0;
            border: 2px solid rgba(255, 215, 0, 0.2);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 0 40px rgba(0,0,0,0.5);
        }

        /* Grid & Cards */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
            margin-top: 50px;
        }

        .card {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 215, 0, 0.1);
            border-radius: 20px;
            padding: 20px;
            cursor: pointer;
            transition: 0.4s;
            text-align: left;
        }

        .card:hover {
            transform: translateY(-10px);
            border-color: var(--gold);
            background: rgba(255, 215, 0, 0.05);
        }

        .card img {
            width: 100%; height: 200px;
            object-fit: cover;
            border-radius: 15px;
            margin-bottom: 15px;
        }

        .card h3 { color: var(--gold); margin: 10px 0; font-family: 'Abhaya Libre', serif; }
        
        /* Modal (Full Screen Content) */
        #content-modal {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(15px);
            z-index: 100;
            display: none; /* පටන් ගද්දි පේන්නේ නැහැ */
            overflow-y: auto;
            padding: 40px 20px;
            box-sizing: border-box;
        }

        .modal-content {
            max-width: 800px;
            margin: 0 auto;
            text-align: left;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .modal-img {
            width: 100%;
            max-height: 400px;
            object-fit: cover;
            border-radius: 20px;
            border: 2px solid var(--gold);
            margin-bottom: 30px;
        }

        .modal-title {
            font-size: 2.5rem;
            color: var(--gold);
            font-family: 'Abhaya Libre', serif;
            margin-bottom: 20px;
        }

        .modal-body {
            font-size: 1.15rem;
            line-height: 1.8;
            color: #eee;
            text-align: justify;
        }

        /* Back Button */
        .back-btn {
            display: inline-block;
            background: transparent;
            color: var(--gold);
            border: 1px solid var(--gold);
            padding: 10px 25px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 1rem;
            margin-bottom: 30px;
            transition: 0.3s;
        }

        .back-btn:hover {
            background: var(--gold);
            color: #000;
        }

        footer {
            margin-top: 60px;
            padding: 40px;
            opacity: 0.6;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <div class="video-bg">
        <iframe src="https://www.youtube.com/embed/d2FI9OfkqR0?autoplay=1&mute=1&loop=1&playlist=d2FI9OfkqR0&controls=0" frameborder="0"></iframe>
    </div>
    <div class="overlay"></div>

    <div class="container" id="main-site">
        <h1>සිරි වෙසක් මංගල්‍යය</h1>
        <p style="letter-spacing: 2px; color: #aaa;">අසිරිමත් සම්බුදු තෙමඟුල උපහාරයකි</p>

        <div class="video-main">
            <iframe width="100%" height="100%" src="https://www.youtube.com/embed/SBRWnqemVJU?start=29" frameborder="0" allowfullscreen></iframe>
        </div>

        <div class="grid">
            <!-- Card 1 -->
            <div class="card" onclick="openContent('birth')">
                <img src="https://i.ytimg.com/vi/hduMQXJkELU/hqdefault.jpg" alt="උත්පත්තිය">
                <h3>බෝසතුන්ගේ උත්පත්තිය</h3>
                <p>වැඩි විස්තර කියවීමට මෙතැන Click කරන්න...</p>
            </div>

            <!-- Card 2 -->
            <div class="card" onclick="openContent('enlightenment')">
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR9sWNfP1QWfxzlxtVKFtkSSEMgV-xieoE_4w&s" alt="බුද්ධත්වය">
                <h3>උතුම් බුද්ධත්වය</h3>
                <p>වැඩි විස්තර කියවීමට මෙතැන Click කරන්න...</p>
            </div>

            <!-- Card 3 -->
            <div class="card" onclick="openContent('death')">
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRyqDaEsdklzgsFnBcB_8OMlNdkgVckCs2ZPg&s" alt="පිරිනිවන් පෑම">
                <h3>මහා පිරිනිවන් පෑම</h3>
                <p>වැඩි විස්තර කියවීමට මෙතැන Click කරන්න...</p>
            </div>
        </div>

        <footer>
            Developed by M.U.R.D.D. Fonseka | ZIYUMI BEAT STUDIO | 2026
        </footer>
    </div>

    <!-- Full Content Modal -->
    <div id="content-modal">
        <div class="modal-content">
            <button class="back-btn" onclick="closeContent()">← ආපසු (Back)</button>
            <img id="m-img" class="modal-img" src="" alt="">
            <h2 id="m-title" class="modal-title"></h2>
            <div id="m-body" class="modal-body"></div>
        </div>
    </div>

    <script>
        // විස්තර ටික Data Object එකක් විදිහට මෙතන තියෙනවා
        const data = {
            birth: {
                title: "බෝසතුන්ගේ උත්පත්තිය",
                img: "https://i.ytimg.com/vi/hduMQXJkELU/hqdefault.jpg",
                text: "ගෞතම බුදුරජාණන් වහන්සේගේ උත්පත්තිය සිදුවූයේ වෙසක් පුර පසළොස්වක පොහොය දිනකයි. උපන් ස්ථානය වන්නේ වර්තමාන දකුණු නේපාලයේ පිහිටි ලුම්බිණි සල් උයනයි. මව්පියන් වූයේ මහාමායා දේවිය සහ සුද්ධෝදන රජුය. බෝසතාණන් වහන්සේ උපත ලැබූ විගස සත් පියුම් මත ඇවිද ගිය බවත්, 'අග්ගෝ හමස්මි ලෝකස්ස' යනුවෙන් අභීත නාදයක් කළ බවත් බෞද්ධ ඉතිහාසයේ සඳහන් වේ."
            },
            enlightenment: {
                title: "උතුම් බුද්ධත්වය",
                img: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR9sWNfP1QWfxzlxtVKFtkSSEMgV-xieoE_4w&s",
                text: "වයස අවුරුදු 29 දී අභිනිෂ්ක්‍රමණය කළ සිද්ධාර්ථ තවුසාණෝ, වසර 6 ක් පුරා දුෂ්කර ක්‍රියා කිරීමෙන් පසු මධ්‍යම ප්‍රතිපදාව අනුගමනය කළහ. පසුව නේරංජරා නදිය අසබඩ බුද්ධගයාවේදී ඇසතු වෘක්ෂ මූලයේ භාවනා කරමින් සිටියදී වෙසක් පුර පසළොස්වක පොහොය දිනක උදෑසන සකලවිධ කෙළෙස් නසා උතුම් සම්මා සම්බුද්ධත්වයට පත් වූ සේක."
            },
            death: {
                title: "මහා පිරිනිවන් පෑම",
                img: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRyqDaEsdklzgsFnBcB_8OMlNdkgVckCs2ZPg&s",
                text: "බුදුරජාණන් වහන්සේ වසර 45 ක් පුරා දෙව් මිනිසුන්ට සද්ධර්මය දේශනා කර වයස අවුරුදු 80 දී කුසිනාරා නුවර මල්ල රජදරුවන්ගේ උපවත්තන සල් උයනේදී පිරිනිවන් පෑ සේක. උන්වහන්සේගේ අවසන් අවවාදය වූයේ 'මහණෙනි, සියලු සංස්කාර ධර්මයෝ විනාශ වන සුළුය. එබැවින් අප්‍රමාදව කුසල් දහම්හි යෙදෙන්න' යන්නයි."
            }
        };

        function openContent(key) {
            document.getElementById('m-title').innerText = data[key].title;
            document.getElementById('m-img').src = data[key].img;
            document.getElementById('m-body').innerText = data[key].text;
            
            document.getElementById('content-modal').style.display = 'block';
            document.body.style.overflow = 'hidden'; // Scroll එක නවත්වනවා
        }

        function closeContent() {
            document.getElementById('content-modal').style.display = 'none';
            document.body.style.overflow = 'auto'; // Scroll එක ආයේ දෙනවා
        }
    </script>

</body>
</html>
